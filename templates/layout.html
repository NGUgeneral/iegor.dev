<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Iegor Dev</title>
    <meta name="description" content="{{ description | default('Personal portfolio and technical writing by Iegor.') }}">
    {% if canonical_url %}
    <link rel="canonical" href="{{ canonical_url }}">
    {% endif %}
    {{ meta_tags }}
    <link rel="icon" href="{{ base_url }}/assets/favicon.ico" sizes="any">
    <link rel="icon" href="{{ base_url }}/assets/icon.png" type="image/png">
    <style>
        :root {
            --body-bg: #fafafa;
            --body-color: #555555;
            --border-color: #e5e5e5;
            --accent-primary: #d1347a;
            --accent-hover: #d1347a;
            --link-color: #0066cc;
            --code-bg: #f0f0f0;
            --code-color: inherit;
            --pre-border: none;
            --header-pattern: url("/assets/background/memphis-pattern-header-light.png");
            --pattern-opacity: 0.1;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --body-bg: #1e1e1e;
                --body-color: #d4d4d4;
                --border-color: #3e3e42;
                --accent-primary: #7a92ad;
                --accent-hover: #7a92ad;
                --link-color: #569cd6;
                --code-bg: #252526;
                --code-color: #ce9178;
                --pre-border: 1px solid #3e3e42;
                --header-pattern: url("/assets/background/memphis-pattern-header-dark.png");
                --pattern-opacity: 0.05;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: var(--body-color);
            background: var(--body-bg);
            transition: background-color 0.3s, color 0.3s;

            /* STICKY FOOTER ENGINE */
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Takes up at least the full viewport height */
            min-height: 100dvh; /* Dynamic viewport height fallback specifically for mobile browser UI bars */
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding: 4rem 0;
            margin-bottom: 2rem;
            position: relative; /* Establish tracking coordinates for pattern */
            background-color: var(--body-bg);
            overflow: hidden;
            flex-shrink: 0; /* Prevents the header from compressing */
        }

        /* Isolated Pattern Engine for Header */
        header::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: var(--header-pattern);
            background-repeat: repeat;
            opacity: var(--pattern-opacity);
            z-index: 0;
            pointer-events: none;
        }

        .header-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1.5rem;
            position: relative;
            z-index: 1;
        }

        h1.site-title {
            font-size: 2.75rem;
            font-weight: 600;
            color: var(--accent-primary);
            margin-bottom: 0.5rem;
        }

        .site-tagline {
            font-size: 0.95rem;
            opacity: 0.7;
        }

        nav {
            margin-top: 1rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        nav a {
            color: inherit;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: color 0.2s;
            opacity: 0.8;
        }

        nav a:hover {
            opacity: 1;
            color: var(--accent-hover);
        }

        main {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;

            /* THE MAGIC LINE: Absorbs all remaining vertical whitespace */
            flex-grow: 1;
        }

        .content {
            line-height: 1.8;
        }

        .content h2 {
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .content h3 {
            font-size: 1.2rem;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .content p {
            margin-bottom: 1rem;
        }

        .content a {
            color: var(--link-color);
            text-decoration: none;
            transition: color 0.2s;
        }

        .content a:hover {
            color: var(--accent-hover);
        }

        .content ul,
        .content ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .content li {
            margin-bottom: 0.5rem;
        }

        .content blockquote {
            border-left: 3px solid var(--border-color);
            padding-left: 1rem;
            margin: 1.5rem 0;
            opacity: 0.85;
            font-style: italic;
        }

        .content code {
            background: var(--code-bg);
            color: var(--code-color);
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: "Courier New", monospace;
            font-size: 0.9rem;
        }

        .content pre {
            background: var(--body-bg);
            border: var(--pre-border);
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            margin-bottom: 1rem;
        }

        .content pre code {
            background: none;
            padding: 0;
            border-radius: 0;
            color: inherit;
        }

        .content img {
            max-width: 100%;
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 1.5rem 0;
        }

        .content img.vertical {
            max-width: 400px;
            width: 100%;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .post-list {
            list-style: none;
        }

        .post-item {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .post-item:last-child {
            border-bottom: none;
        }

        .post-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .post-title a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }

        .post-title a:hover {
            color: var(--accent-hover);
        }

        .post-date {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 0.5rem;
        }

        .post-excerpt {
            opacity: 0.85;
        }

        .project-list {
            list-style: none;
        }

        .project-item {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .project-item:last-child {
            border-bottom: none;
        }

        .project-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .project-title a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }

        .project-title a:hover {
            color: var(--accent-hover);
        }

        .project-date {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 0.5rem;
        }

        .project-excerpt {
            opacity: 0.85;
        }

        footer {
            border-top: 1px solid var(--border-color);
            padding: 3rem 0;
            margin-top: 3rem;
            text-align: center;
            font-size: 0.9rem;
            position: relative;
            background-color: var(--body-bg);
            overflow: hidden;
            flex-shrink: 0; /* Prevents the footer from compressing */
        }

        footer::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: var(--header-pattern);
            background-repeat: repeat;
            opacity: var(--pattern-opacity);
            z-index: 0;
            pointer-events: none;
        }

        footer p {
            position: relative;
            z-index: 1;
            opacity: 0.7;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: var(--link-color);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent-hover);
        }

        @media (max-width: 600px) {
            body {
                font-size: 15px;
            }

            header {
                padding: 1.5rem 0;
            }

            h1.site-title {
                font-size: 1.5rem;
            }

            nav {
                gap: 1rem;
            }

            main {
                padding: 0 1rem 2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <h1 class="site-title"><a href="{{ base_url }}/" style="color: inherit; text-decoration: none;">iegor.dev</a></h1>
            <p class="site-tagline">Senior Systems Architect & Backend Engineer: Python | .NET | Go | Cloud. Technical Writing</p>
            <nav>
                <a href="{{ base_url }}/">About</a>
                <a href="{{ base_url }}/posts/">Posts</a>
                <a href="{{ base_url }}/projects/">Projects</a>
                <a href="{{ base_url }}/contact/">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <article class="content">
            {{ content }}
        </article>
    </main>

    <footer>
        <p>&copy; {{ current_year }} Iegor Osaulenko. All rights reserved.</p>
        <!-- The Shopkeeper's Bell (Anonymized Pageview Tracker) -->
        <img
            src="https://vbqqmbtwkvacsdhlcwra.supabase.co/functions/v1/doorbell?path={{ title | lower | replace(' ', '-') }}" 
                width="1" height="1" alt="" style="position: absolute; left: -9999px; opacity: 0;" 
        />
    </footer>
</body>
</html>
